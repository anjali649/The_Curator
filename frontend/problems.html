      </header>
      <div class="app-body">
        <div class="main">
          <header class="page-header">
            <h1>Problems Explorer</h1>
            <p>Clustered dataset of real-world pain points — open a card to analyze or submit an idea.</p>
          </header>

          <div id="prob-error" class="msg msg--error hidden"></div>

          <div class="trending-strip">
            <h2>Trending</h2>
            <div class="trending-items" id="trending-links"></div>
          </div>

          <div class="pill-row" id="category-pills"></div>

          <div class="filters" id="explorer-search">
            <input
              id="global-search"
              type="search"
              name="search"
              placeholder="Search problems…"
              autocomplete="off"
              aria-label="Search problems"
            />
            <select id="filter-cluster" aria-label="Cluster"></select>
            <button type="button" class="btn btn--primary" id="btn-apply">Apply filters</button>
          </div>

          <div class="problem-grid" id="problem-grid">
            <p class="loading">Loading problems…</p>
          </div>
          <div class="pagination hidden" id="pagination" aria-label="Pagination"></div>
        </div>
      </div>
    </div>

    <script src="/js/api.js?v=20260414g"></script>
    <script src="/js/problems.js?v=20260414h"></script>
